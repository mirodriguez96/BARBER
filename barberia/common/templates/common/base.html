<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>
            {% block title %}{% endblock %}
        | Barbería Admin</title>
        {% load static %}
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5v5Y5d2mI5hJkz4Qqf7fM6t5K8Qm"
              crossorigin="anonymous" />
        <link href="{% static 'common/css/styles.css' %}?v=4" rel="stylesheet" />
        {% if company_logo_url %}
            <link rel="icon" href="{{ company_logo_url }}" />
            <link rel="apple-touch-icon" href="{{ company_logo_url }}" />
        {% else %}
            <link rel="icon"
                  href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>%E2%9C%82</text></svg>"
                  type="image/svg+xml" />
        {% endif %}
    </head>
    <body class="{% if user.is_authenticated %}app-shell{% else %}auth-page{% endif %}">
        <main class="{% if user.is_authenticated %}pb-5{% else %}auth-shell{% endif %}">
            {% block content %}{% endblock %}
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA5ND0dfyY4xXh1i1N3L6xWk4Cq0qX9"
                crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
        <script src="{% static 'common/js/scripts.js' %}?v=2"></script>
    </body>
</html>
